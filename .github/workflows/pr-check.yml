name: PR check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff format check
        run: uv run ruff format --check --diff function_app.py src

      - name: Ruff lint
        run: uv run ruff check function_app.py src
